<div class="mini-historico" data-role="mini-historico">
  <div class="mini-historico__header">
    <h3 class="mini-historico__title">Histórico recente</h3>
    <button type="button" class="mini-historico__open-full" data-role="open-full">
      Ver tudo
    </button>
  </div>

  <div class="mini-historico__state mini-historico__loading" data-role="loading" hidden>
    Carregando histórico…
  </div>

  <div class="mini-historico__state mini-historico__error" data-role="error" hidden></div>

  <div class="mini-historico__state mini-historico__empty" data-role="empty" hidden>
    Nenhuma visita registrada ainda.
  </div>

  <ul class="mini-historico__list" data-role="list"></ul>
</div>
