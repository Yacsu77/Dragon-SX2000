<div class="arquivos-screen" data-role="arquivos-screen">
  <header class="arquivos-screen__header">
    <h1 class="arquivos-screen__title">Arquivos</h1>
    <div class="arquivos-screen__actions">
      <button type="button" class="arquivos-screen__btn" data-role="pick-folder">Abrir pasta</button>
      <button type="button" class="arquivos-screen__close" data-role="close" aria-label="Fechar">×</button>
    </div>
  </header>

  <nav class="arquivos-breadcrumb" data-role="breadcrumb"></nav>

  <div class="arquivos-screen__body">
    <p class="arquivos-empty" data-role="empty" hidden>Pasta vazia.</p>
    <p class="arquivos-error" data-role="error" hidden></p>
    <ul class="arquivos-list" data-role="list"></ul>
  </div>
</div>
