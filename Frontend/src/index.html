<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon SX2000</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="../../UserINTer/Tabline/idget/Wallpaper/index.css">
</head>
<body>
  <div class="background">
    <video
      class="background-video"
      autoplay
      muted
      loop
      playsinline
    >
      <source src="../../UserINTer/back%20groud/dark-queen-knight-moewalls-com.mp4" type="video/mp4" />
    </video>
  </div>
  <!-- Navigation Bar -->
  <div class="nav-bar">
    <div class="nav-left">
      <button class="nav-btn menu-btn" id="menuBtn" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <button class="nav-btn" id="backBtn" title="Voltar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button class="nav-btn" id="forwardBtn" title="Avançar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <div class="nav-center">
      <form class="address-bar" id="addressBar">
        <svg class="search-icon-nav" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input 
          type="text" 
          class="address-input" 
          id="addressInput"
          placeholder="Busque ou digite o nome do site"
          autocomplete="off"
        />
      </form>
    </div>

    <div class="nav-right">
      <button class="nav-btn" id="downloadBtn" title="Downloads">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
      <button class="nav-btn" id="shareBtn" title="Compartilhar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
      </button>
      <button class="nav-btn" id="newTabBtn" title="Nova aba">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="nav-btn" id="overviewBtn" title="Visão geral das abas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </button>
    </div>
  </div>

  <!-- Tabs Bar -->
  <div class="tabs-bar">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="edge-hitbox" aria-hidden="true"></div>
  <aside class="side-tabs" id="sideTabs" aria-label="Idgets">
    <nav class="tabs-list">
      <span class="tabs-hover" aria-hidden="true"></span>
      <span class="tabs-tooltip" id="tabsTooltip" aria-hidden="true"></span>
      <a class="tab-item active" data-idget="wallpaper" aria-label="Wallpaper" title="Wallpaper" href="#wallpaper-widget">
        <span class="tab-icon" data-lucide="image"></span>
        <span class="tab-label">Wallpaper</span>
      </a>
      <button class="tab-item" data-idget="tema" aria-label="Tema" title="Tema">
        <span class="tab-icon" data-lucide="palette"></span>
        <span class="tab-label">Tema</span>
      </button>
      <button class="tab-item" data-idget="customise" aria-label="Customise" title="Customise">
        <span class="tab-icon" data-lucide="sliders"></span>
        <span class="tab-label">Customise</span>
      </button>
      <button class="tab-item" data-idget="donate" aria-label="Donate" title="Donate">
        <span class="tab-icon" data-lucide="heart"></span>
        <span class="tab-label">Donate</span>
      </button>
      <button class="tab-item" data-idget="autotune" aria-label="AutoTune" title="AutoTune">
        <span class="tab-icon" data-lucide="sparkles"></span>
        <span class="tab-label">AutoTune</span>
      </button>
    </nav>
  </aside>

  <!-- Página Inicial -->
  <div class="home-page" id="homePage">
    <div class="logo-container">
      <div class="logo">🐉 Dragon SX2000</div>
      <div class="tagline">Navegue com estilo e velocidade</div>
    </div>
    
    <div class="search-container-home">
      <form class="search-box" id="searchForm">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          class="search-input-home" 
          id="searchInput"
          placeholder="Pesquise na web..."
          autocomplete="off"
        />
        <button type="submit" class="search-button-home">Buscar</button>
      </form>
    </div>

    <div class="quick-links">
      <div class="quick-link" data-query="YouTube">📺 YouTube</div>
      <div class="quick-link" data-query="GitHub">💻 GitHub</div>
      <div class="quick-link" data-query="Stack Overflow">❓ Stack Overflow</div>
      <div class="quick-link" data-query="Reddit">💬 Reddit</div>
    </div>
  </div>

  <!-- Container do Navegador -->
  <div class="browser-container" id="browser"></div>

  <!-- Wallpaper Widget -->
  <div id="wallpaper-widget" class="wallpaper-overlay" aria-hidden="true">
    <div class="wallpaper-shell wallpaper-widget" role="dialog" aria-modal="true" aria-labelledby="wallpaperWidgetTitle">
      <a class="wallpaper-close" href="#" aria-label="Fechar">×</a>
      <main class="widget">
        <header class="widget-header">
          <h1 id="wallpaperWidgetTitle">Wallpaper</h1>
          <p>Escolha e ajuste o wallpaper do ambiente.</p>
        </header>

        <section class="wallpaper-panel">
          <div class="wallpaper-preview" id="wallpaperPreview">
            <div class="preview-layer" id="previewLayer">
              <span class="preview-placeholder">Selecione uma imagem ou video</span>
            </div>
          </div>

          <div class="wallpaper-controls">
            <div class="wallpaper-actions">
              <label class="upload-btn">
                Subir imagem
                <input id="wallpaperImageInput" type="file" accept="image/*" hidden />
              </label>
              <label class="upload-btn secondary">
                Subir video
                <input id="wallpaperVideoInput" type="file" accept="video/*" hidden />
              </label>
            </div>

            <div class="adjustments">
              <div class="adjustment-row">
                <label for="rotateControl">Rotacao</label>
                <input id="rotateControl" type="range" min="-180" max="180" value="0" />
              </div>
              <div class="adjustment-row buttons">
                <button class="control-btn" id="flipHorizontal" type="button">Inverter X</button>
                <button class="control-btn" id="flipVertical" type="button">Inverter Y</button>
                <button class="control-btn ghost" id="resetAdjustments" type="button">Resetar</button>
              </div>
              <p class="hint">
                Arraste no preview para mover o wallpaper.
              </p>
            </div>

            <div class="apply-row">
              <button class="apply-btn" id="applyWallpaper" type="button">Aplicar</button>
              <span class="status" id="wallpaperStatus" aria-live="polite"></span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/tabs.js"></script>
  <script src="js/search.js"></script>
  <script src="../../node_modules/lucide/dist/umd/lucide.min.js"></script>
  <script src="js/app.js"></script>
  <script src="../../UserINTer/Tabline/idget/Wallpaper/index.js"></script>
</body>
</html>
