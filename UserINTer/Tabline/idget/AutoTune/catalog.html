<div id="autotune-widget" class="autotune-overlay" aria-hidden="true">
  <div class="autotune-shell">
    <a class="autotune-close" href="#" aria-label="Fechar">×</a>
    <h2>AutoTune</h2>
    <p>Ative cada cosmético para mostrá-lo na página inicial. Desative para escondê-lo (a posição fica guardada). Arraste pelo título; redimensione pelo canto.</p>
    <div class="autotune-catalog">
      <div class="autotune-catalog-row">
        <div class="autotune-row-text">
          <strong>Timer</strong>
          <span>Cronômetro</span>
        </div>
        <button
          type="button"
          class="autotune-row-factory-btn"
          data-open-factory="true"
          data-factory-key="autotune-widget-timer"
          data-factory-target='[data-widget-type="timer"]'
          data-factory-label="AutoTune Timer"
          title="Factory do Timer"
          aria-label="Factory do Timer"
        >⚙</button>
        <label class="autotune-panel-toggle">
          <span class="autotune-panel-toggle-label" data-autotune-panel-label="timer">Inativo</span>
          <input type="checkbox" data-autotune-panel-toggle="timer" />
          <span class="autotune-panel-switch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="autotune-catalog-row">
        <div class="autotune-row-text">
          <strong>Share</strong>
          <span>Pesquisa rapida</span>
        </div>
        <button
          type="button"
          class="autotune-row-factory-btn"
          data-open-factory="true"
          data-factory-key="autotune-widget-share"
          data-factory-target='[data-widget-type="share"]'
          data-factory-label="AutoTune Share"
          title="Factory do Share"
          aria-label="Factory do Share"
        >⚙</button>
        <label class="autotune-panel-toggle">
          <span class="autotune-panel-toggle-label" data-autotune-panel-label="share">Inativo</span>
          <input type="checkbox" data-autotune-panel-toggle="share" />
          <span class="autotune-panel-switch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="autotune-catalog-row">
        <div class="autotune-row-text">
          <strong>Tasklist</strong>
          <span>Lista de tarefas</span>
        </div>
        <button
          type="button"
          class="autotune-row-factory-btn"
          data-open-factory="true"
          data-factory-key="autotune-widget-tasklist"
          data-factory-target='[data-widget-type="tasklist"]'
          data-factory-label="AutoTune Tasklist"
          title="Factory do Tasklist"
          aria-label="Factory do Tasklist"
        >⚙</button>
        <label class="autotune-panel-toggle">
          <span class="autotune-panel-toggle-label" data-autotune-panel-label="tasklist">Inativo</span>
          <input type="checkbox" data-autotune-panel-toggle="tasklist" />
          <span class="autotune-panel-switch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="autotune-catalog-row">
        <div class="autotune-row-text">
          <strong>Music</strong>
          <span>Now playing (Dragon Media SDK)</span>
        </div>
        <button
          type="button"
          class="autotune-row-factory-btn"
          data-open-factory="true"
          data-factory-key="autotune-widget-music"
          data-factory-target='[data-widget-type="music"]'
          data-factory-label="AutoTune Music"
          title="Factory do Music"
          aria-label="Factory do Music"
        >⚙</button>
        <label class="autotune-panel-toggle">
          <span class="autotune-panel-toggle-label" data-autotune-panel-label="music">Inativo</span>
          <input type="checkbox" data-autotune-panel-toggle="music" />
          <span class="autotune-panel-switch" aria-hidden="true"></span>
        </label>
      </div>
      <div class="autotune-catalog-row">
        <div class="autotune-row-text">
          <strong>Clock</strong>
          <span>Relogio personalizavel</span>
        </div>
        <button
          type="button"
          class="autotune-row-factory-btn"
          data-open-factory="true"
          data-factory-key="autotune-widget-clock"
          data-factory-target='[data-widget-type="clock"]'
          data-factory-label="AutoTune Clock"
          title="Factory do Clock"
          aria-label="Factory do Clock"
        >⚙</button>
        <label class="autotune-panel-toggle">
          <span class="autotune-panel-toggle-label" data-autotune-panel-label="clock">Inativo</span>
          <input type="checkbox" data-autotune-panel-toggle="clock" />
          <span class="autotune-panel-switch" aria-hidden="true"></span>
        </label>
      </div>
    </div>
  </div>
</div>
